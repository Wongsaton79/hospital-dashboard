<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - ระบบจัดการฐานข้อมูล (Fixed Upload)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style> body { font-family: 'Sarabun', sans-serif; } </style>
</head>
<body class="bg-gray-100 p-6">
    <div class="max-w-4xl mx-auto bg-white p-8 rounded-xl shadow-lg border-t-4 border-sky-500">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-gray-800">⚙️ Admin Panel (Auto-Normalize Data)</h1>
            <div class="flex items-center gap-3">
                <span id="status" class="text-gray-500 font-bold text-sm">⏳ รอการเชื่อมต่อ...</span>
                <button onclick="location.reload()" class="bg-gray-100 px-3 py-1 rounded text-sm font-bold text-gray-600">↻ รีเฟรช</button>
            </div>
        </div>

        <div class="p-6 bg-blue-50 rounded-lg border border-blue-200 mb-6">
            <div class="flex justify-between mb-4">
                <h2 class="font-bold text-blue-900">1. ฐานข้อมูลพนักงาน (Staff)</h2>
                <div class="text-right">
                    <span id="cntStaff" class="font-bold text-blue-600 text-xl">-</span> คน
                    <button onclick="deleteStaffOnly()" class="ml-4 text-xs text-red-500 underline">ลบรายชื่อ</button>
                </div>
            </div>
            <input type="file" id="fileStaff" accept=".xlsx, .xls, .csv" class="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-white file:text-blue-700 hover:file:bg-blue-100"/>
        </div>

        <div class="grid md:grid-cols-2 gap-6 mb-6">
            <div class="p-4 bg-green-50 rounded-lg border border-green-200">
                <h2 class="font-bold text-green-900 mb-2">2. เวลาเข้า-ออก (Attendance)</h2>
                <input type="file" id="fileTime" accept=".xlsx, .xls, .csv" class="block w-full text-sm"/>
                <div class="text-xs text-green-700 mt-2 bg-green-100 p-2 rounded">
                    <strong>Logic ปัจจุบัน:</strong><br>
                    ⏰ สาย: 08:31 - 11:00<br>
                    🚪 กลับก่อน: 15:00 - 16:29<br>
                    ☀️ เข้าก่อน: 06:00 - 07:59
                </div>
            </div>
            <div class="p-4 bg-orange-50 rounded-lg border border-orange-200">
                <h2 class="font-bold text-orange-900 mb-2">3. การลา (Leave)</h2>
                <input type="file" id="fileLeave" accept=".xlsx, .xls, .csv" class="block w-full text-sm"/>
                <p class="text-xs text-orange-600 mt-2">* อัพเดตระบบค้นหาหัวตารางอัตโนมัติ</p>
            </div>
        </div>

        <div class="border-t pt-4">
            <p class="text-sm text-gray-500 mb-2">รายการวันที่ในระบบ: <span id="cntDays" class="font-bold">0</span> วัน</p>
            <div id="dateListContainer" class="bg-gray-50 rounded-lg p-2 max-h-60 overflow-y-auto space-y-2 border border-gray-200"></div>
        </div>

        <div class="mt-6 pt-4 border-t text-center">
            <button onclick="wipeData()" class="text-red-400 text-xs underline">⚠️ ล้างข้อมูลทั้งหมด (Factory Reset)</button>
        </div>
    </div>

    <script>
        const API_URL = "https://bdlh-cs-default-rtdb.asia-southeast1.firebasedatabase.app/data.json"; 
        let globalData = { staff: {}, records: [] };

        // --- เพิ่มรายการ DEPT_TARGETS จาก index.html มาไว้ที่นี่เพื่อ Normalize ---
        const DEPT_TARGETS_KEYS = [
            "All Departments/กลุ่มงานจิตเวชและยาเสพติด", "All Departments/กลุ่มงานทันตกรรม", 
            "All Departments/กลุ่มงานบริการด้านปฐมภูมิและองค์รวม", "All Departments/กลุ่มงานโภชนศาสตร์", 
            "All Departments/กลุ่มงานรังสีวิทยา", "All Departments/กลุ่มงานเวชกรรมฟื้นฟู", 
            "All Departments/กลุ่มงานสุขภาพดิจิทัล", "All Departments/กลุ่มเทคนิคการแพทย์", 
            "All Departments/กลุ่มงานประปาและบำบัด", "All Departments/กลุ่มงานงานสวน", 
            "All Departments/กลุ่มงานจ่ายกลาง", "All Departments/กลุ่มงานช่างซ่อมบำรุง", 
            "All Departments/กลุ่มงานซักฟอก", "All Departments/กลุ่มงานบริหารทั่วไป", 
            "All Departments/กลุ่มงานOPD", "All Departments/กลุ่มงานIPD", 
            "All Departments/กลุ่มงานพนักงานขับรถ", "All Departments/กลุ่มงานการแพทย์", 
            "All Departments/กลุ่มงานการแพทย์แผนไทยและการแพทย์ทางเลือก", 
            "All Departments/กลุ่มงานเภสัชกรรมและคุ้มครองผู้บริโภค", "All Departments/กลุ่มงานแม่บ้าน", 
            "All Departments/กลุ่มงาน รปภ.", "All Departments/กลุ่มงานห้องคลอด", 
            "All Departments/กลุ่มงานห้องฉุกเฉิน"
        ];

        // ฟังก์ชันทำความสะอาดชื่อแผนกให้ตรงกับ DEPT_TARGETS แบบ 100%
        function normalizeDeptName(rawDept) {
            let s = String(rawDept || '').trim();
            if (s === '' || s === 'ไม่ระบุ' || s.includes('ไม่มีข้อมูล')) return 'ไม่ระบุ';
            
            // ทำให้ชื่อดิบสะอาดที่สุด ตัดอักขระพิเศษ เว้นวรรค และคำว่า กลุ่ม/งาน ออก
            const cleanStr = (str) => String(str).replace(/[\s.\-\/+และ]/g, '').toLowerCase()
                .replace(/alldepartments/i, '').replace(/กลุ่มงาน/i, '').replace(/กลุ่ม/i, '').replace(/งาน/i, '').trim();
            
            let targetClean = cleanStr(s);

            for (let target of DEPT_TARGETS_KEYS) {
                if (cleanStr(target) === targetClean) {
                    return target; // ส่งคืนชื่อเต็มที่ถูกต้องเป๊ะๆ
                }
            }
            
            // ถ้าไม่ตรงกับอะไรเลย ให้เติม All Departments/ ไปก่อน
            return s.startsWith("All Departments/") ? s : "All Departments/" + s.replace(/^All\s+Departments[\s\-\/]*/i, '').trim();
        }

        (async () => { await checkConnection(); })();

        async function checkConnection() {
            try {
                const res = await fetch(`${API_URL}?t=${Date.now()}`);
                if(res.ok) {
                    const json = await res.json();
                    globalData = json || { staff: {}, records: [] };
                    if(!globalData.staff) globalData.staff = {};
                    if(!globalData.records) globalData.records = [];
                    updateUI();
                    document.getElementById('status').innerText = "✅ เชื่อมต่อแล้ว";
                    document.getElementById('status').className = "text-green-600 font-bold text-sm";
                }
            } catch (e) { document.getElementById('status').innerText = "❌ เชื่อมต่อไม่ได้"; }
        }

        async function saveToCloud() {
            try {
                await fetch(API_URL, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(globalData) });
                updateUI(); alert('✅ บันทึกสำเร็จ!');
            } catch (e) { alert('Error: ' + e.message); }
        }

        function updateUI() {
            document.getElementById('cntStaff').innerText = Object.keys(globalData.staff).length;
            document.getElementById('cntDays').innerText = globalData.records.length;
            const listDiv = document.getElementById('dateListContainer');
            if(globalData.records.length === 0) listDiv.innerHTML = '<p class="text-center text-xs text-gray-400 py-4">ว่างเปล่า</p>';
            else {
                const sorted = [...globalData.records].sort((a,b) => new Date(b.date) - new Date(a.date));
                listDiv.innerHTML = sorted.map(rec => `
                    <div class="flex justify-between items-center bg-white p-2 rounded border border-gray-200 shadow-sm">
                        <div class="text-sm">
                            <span class="font-bold text-gray-700">${rec.date}</span> 
                            <span class="text-xs text-gray-500">(${rec.day})</span>
                            <span class="ml-2 text-[10px] bg-emerald-100 text-emerald-700 px-1 rounded">สแกน: ${rec.summary.scanned}</span>
                            <span class="ml-1 text-[10px] bg-orange-100 text-orange-600 px-1 rounded">ลา: ${rec.summary.leave}</span>
                        </div>
                        <button onclick="deleteDate('${rec.date}')" class="text-xs text-red-500 border border-red-200 px-2 py-1 rounded hover:bg-red-50">ลบ</button>
                    </div>`).join('');
            }
        }

        document.getElementById('fileStaff').addEventListener('change', (e) => processFile(e, 'staff'));
        document.getElementById('fileTime').addEventListener('change', (e) => processFile(e, 'time'));
        document.getElementById('fileLeave').addEventListener('change', (e) => processFile(e, 'leave'));

        function processFile(event, type) {
            const file = event.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (evt) => {
                const data = new Uint8Array(evt.target.result);
                let wb = XLSX.read(data, {type:'array'});
                if(file.name.endsWith('.csv')) {
                    const dec = new TextDecoder('windows-874');
                    const text = dec.decode(data);
                    if(text.includes('ID') || text.includes('id')) wb = XLSX.read(text, {type:'string'});
                }
                const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header:1});
                if(type === 'staff') processStaff(rows);
                else if(type === 'time') processTime(rows);
                else if(type === 'leave') processLeave(rows);
            };
            reader.readAsArrayBuffer(file);
        }

        async function processStaff(rows) {
            let hIdx = -1;
            for(let i=0; i<Math.min(rows.length,20); i++) { if(JSON.stringify(rows[i]).toUpperCase().includes("ID")) { hIdx=i; break; } }
            const start = hIdx===-1?0:hIdx+1;
            const newStaff = {};
            for(let i=start; i<rows.length; i++) {
                const r = rows[i];
                if(r && r[0]) {
                    // ทำความสะอาด ID (ลบช่องว่าง, เอา 0 ข้างหน้าออกถ้าจำเป็น)
                    const id = String(r[0]).trim().replace(/^0+/, ''); 
                    
                    // เรียกใช้ฟังก์ชัน Normalize ชื่อแผนก
                    const rawDeptName = String(r[3]||'ไม่ระบุ').trim();
                    const normalizedDept = normalizeDeptName(rawDeptName);

                    newStaff[id] = { id, name: `${r[1]||''} ${r[2]||''}`.trim(), dept: normalizedDept };
                }
            }
            if(confirm(`พบรายชื่อบุคลากร ${Object.keys(newStaff).length} คน ยืนยันการอัปเดต?`)) { globalData.staff = newStaff; await saveToCloud(); }
        }

        async function processTime(rows) {
            if(Object.keys(globalData.staff).length === 0) return alert("⚠️ กรุณาอัปโหลดรายชื่อพนักงาน (Staff) ก่อนครับ");
            
            let hIdx = -1, headers = [];
            for(let i=0; i<rows.length; i++) {
                const r = (rows[i] || []).map(x=>String(x).trim());
                if(r.includes('ID') && (r.includes('บันทึก')||r.includes('เวลา'))) { hIdx=i; headers=r; break; }
            }
            if(hIdx === -1) return alert("❌ ไม่พบหัวตาราง (ต้องมี ID และ บันทึก/เวลา)");

            let dateStr = null;
            let dateColIdx = headers.indexOf("วันที่");
            if(dateColIdx === -1) dateColIdx = 4;

            if(rows.length > hIdx + 1) {
                const firstDataRow = rows[hIdx + 1];
                if(firstDataRow && firstDataRow[dateColIdx]) {
                    dateStr = firstDataRow[dateColIdx];
                }
            }
            if(!dateStr) {
                 for(let i=0; i<hIdx; i++) {
                     const cell = String(rows[i][0]||"");
                     if(cell.includes("ช่วงเวลา:")) {
                         const match = cell.match(/(\d{4}-\d{2}-\d{2})/);
                         if(match) dateStr = match[1];
                     }
                 }
            }

            const validDate = parseDate(dateStr);
            if(!validDate) return alert(`❌ ไม่พบวันที่ หรือรูปแบบผิด (${dateStr})`);
            
            dateStr = validDate;

            globalData.records = globalData.records.filter(r => r.date !== dateStr);

            const scanned = new Set();
            const scannedDetails = []; 
            const late=[], earlyArrival=[], earlyLeave=[], hourly=new Array(24).fill(0).map(()=>({in:0,out:0}));
            const missing=[], missingDept={};

            for(let i=hIdx+1; i<rows.length; i++) {
                const r = rows[i];
                if(!r) continue;
                let obj = {}; headers.forEach((h,k) => obj[h]=r[k]);
                
                // ทำความสะอาด ID ให้เหมือนตอน Staff
                const id = String(obj['ID']).trim().replace(/^0+/, '');
                
                if(!globalData.staff[id]) continue;

                const timeStr = obj['บันทึก'] || obj['เวลา'] || "";
                const times = timeStr.split(';').map(t=>t.trim()).filter(t=>t);

                if (!scanned.has(id)) {
                    scanned.add(id);
                    scannedDetails.push({
                        id: id,
                        name: globalData.staff[id].name,
                        dept: globalData.staff[id].dept, // ดึงแผนกที่ Normalized แล้วมาใส่
                        time: times.length > 0 ? times[0] : "-"
                    });
                }

                if(times.length > 0) {
                    const t1 = parseTime(times[0]);
                    if(t1) {
                        hourly[t1.h].in++;
                        if(t1.mins > 8*60+30 && t1.mins <= 11*60) {
                            late.push({ id, name: globalData.staff[id].name, dept: globalData.staff[id].dept, time: t1.str, lateMins: t1.mins - (8*60+30) });
                        }
                        if(t1.mins >= 6*60 && t1.mins < 8*60) {
                            earlyArrival.push({ id, name: globalData.staff[id].name, dept: globalData.staff[id].dept, time: t1.str, arriveEarlyMins: (8*60) - t1.mins });
                        }
                    }
                }

                if(times.length > 0) {
                    const lastT = parseTime(times[times.length-1]);
                    if(lastT) {
                        if(times.length > 1) hourly[lastT.h].out++;
                        if(lastT.mins >= 15*60 && lastT.mins < 16*60+30) {
                            earlyLeave.push({
                                id, name: globalData.staff[id].name, dept: globalData.staff[id].dept, time: lastT.str, earlyLeaveMins: (16*60+30) - lastT.mins
                            });
                        }
                    }
                }
            }

            Object.values(globalData.staff).forEach(emp => {
                if(!scanned.has(emp.id)) { missing.push(emp); missingDept[emp.dept]=(missingDept[emp.dept]||0)+1; }
            });

            globalData.records.push({
                date: dateStr,
                day: getDayName(dateStr),
                isWeekend: false,
                summary: { total: Object.keys(globalData.staff).length, scanned: scanned.size, checkedOut: 0, leave: 0, missing: missing.length },
                lists: { scanned: scannedDetails, late, earlyArrival, earlyLeave, missing, missingDept, leave: [] }, 
                charts: { hourly },
                scannedIds: Array.from(scanned)
            });
            
            const dObj = new Date(dateStr);
            if(dObj.getDay()===0||dObj.getDay()===6) globalData.records[globalData.records.length-1].isWeekend=true;
            globalData.records.sort((a,b)=>new Date(a.date)-new Date(b.date));
            await saveToCloud();
        }

        async function processLeave(rows) {
            let hIdx = -1;
            let headers = [];
            
            for(let i=0; i<rows.length; i++) {
                const r = (rows[i] || []).map(x => String(x).trim());
                if(r.includes('ID') && (r.includes('วันที่ลางาน') || r.includes('วันที่') || r.includes('Start Date'))) {
                    hIdx = i; headers = r; break;
                }
            }

            if(hIdx === -1) return alert("❌ ไม่พบหัวตารางในไฟล์ใบลา (ต้องมีคอลัมน์ 'ID' และ 'วันที่ลางาน')");

            const colID = headers.indexOf('ID');
            let colDate = headers.findIndex(h => h.includes('วันที่ลางาน') || h.includes('วันที่') || h.includes('Start Date'));
            let colType = headers.findIndex(h => h.includes('ประเภท') || h.includes('Type'));

            if(colDate === -1) return alert("❌ ไม่พบคอลัมน์ 'วันที่ลางาน'");

            let count = 0;
            let processedDates = new Set();

            for(let i = hIdx + 1; i < rows.length; i++) {
                const r = rows[i];
                if(!r) continue;

                // ทำความสะอาด ID
                const id = String(r[colID] || "").trim().replace(/^0+/, '');
                const dRaw = r[colDate];
                const type = colType !== -1 ? (r[colType] || "ลา") : "ลา";

                if(id && dRaw) {
                    const dateStr = parseDate(dRaw);
                    if(dateStr) {
                        processedDates.add(dateStr);
                        let rec = globalData.records.find(d => d.date === dateStr);
                        
                        if(rec) {
                            if(!rec.lists.leave) rec.lists.leave = [];
                            if(!rec.lists.leave.find(l => l.id == id)) {
                                rec.lists.leave.push({ 
                                    id: id, 
                                    name: globalData.staff[id]?.name || id, 
                                    dept: globalData.staff[id]?.dept || 'ไม่ระบุ', 
                                    type: type 
                                });
                                count++;
                            }
                        }
                    }
                }
            }

            processedDates.forEach(dStr => {
                const rec = globalData.records.find(d => d.date === dStr);
                if(rec) {
                    rec.summary.leave = rec.lists.leave.length;
                    const leaveIds = new Set(rec.lists.leave.map(l => String(l.id)));
                    const scannedIds = new Set(rec.scannedIds);
                    
                    const newMissing = [];
                    const newMissingDept = {};

                    Object.values(globalData.staff).forEach(emp => {
                        if(!scannedIds.has(emp.id) && !leaveIds.has(emp.id)) {
                            newMissing.push(emp);
                            newMissingDept[emp.dept] = (newMissingDept[emp.dept]||0) + 1;
                        }
                    });

                    rec.lists.missing = newMissing;
                    rec.lists.missingDept = newMissingDept;
                    rec.summary.missing = newMissing.length;
                }
            });

            if(count > 0) {
                await saveToCloud();
                alert(`✅ อัปเดตข้อมูลการลาพร้อมแผนกสำเร็จ: ${count} รายการ`);
            } else {
                alert("⚠️ ไม่พบข้อมูลที่ตรงกัน หรือยังไม่ได้อัพโหลดไฟล์เวลาของวันนั้นๆ");
            }
        }

        function deleteStaffOnly() { if(confirm("ลบรายชื่อ?")) { globalData.staff={}; saveToCloud(); } }
        function deleteDate(d) { if(confirm("ลบวันที่ "+d+"?")) { globalData.records=globalData.records.filter(r=>r.date!==d); saveToCloud(); } }
        function wipeData() { if(confirm("ล้างทั้งหมด?")) { globalData={staff:{},records:[]}; saveToCloud(); } }
        function parseTime(s) { const [h,m]=s.split(':').map(Number); return {str:s, mins:h*60+m, h}; }
        function parseDate(v) { 
            if(!v) return null;
            if(typeof v==='number') return new Date(Math.round((v-25569)*864e5)).toISOString().split('T')[0]; 
            if(typeof v==='string') {
                const p=v.trim().split(/[-/]/); 
                if(p.length===3) return `${parseInt(p[0])>2000?p[0]:(parseInt(p[2])>2400?parseInt(p[2])-543:p[2])}-${p[1].padStart(2,'0')}-${parseInt(p[0])>2000?p[2]:p[0].padStart(2,'0')}`; 
            } 
            return null; 
        }
        function getDayName(d) { return ['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัส','ศุกร์','เสาร์'][new Date(d).getDay()]; }
    </script>
</body>
</html>
